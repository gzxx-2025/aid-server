# AID 站点配置（容器内路径，由 docker-compose 挂载）
# 布局：80 端口 = C端用户端；8090 端口 = 后台管理端（根路径托管，与常规静态部署习惯一致）
# 生产环境建议在本文件基础上增加 HTTPS（443 监听 + 证书 + 80 跳转）。

# 仅在请求确实携带 Upgrade 头时才发送 Connection: upgrade，普通请求保持 keep-alive
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# ---------------- C端用户端（80） ----------------
server {
    listen 80;
    server_name _;

    client_max_body_size 1024m;

    # 容器健康检查端点（仅反映 Nginx 自身存活）
    location = /healthz {
        access_log off;
        return 200 "ok";
    }

    # C端用户端 API（浏览器同源 /aid 前缀）
    location /aid/ {
        proxy_pass http://aid-server:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # 上传文件访问
    location /profile/ {
        proxy_pass http://aid-server:8080/profile/;
    }

    # C端用户端（Nuxt SSR，兜底路由必须放最后）
    location / {
        proxy_pass http://aid-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ---------------- 后台管理端（8090，根路径托管） ----------------
server {
    listen 8090;
    server_name _;

    client_max_body_size 1024m;

    root /usr/share/nginx/aid/admin-dist;
    index index.html;

    # 前端路由刷新回退到入口页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 管理端 API（/prod-api 前缀）
    location /prod-api/ {
        proxy_pass http://aid-server:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        # SSE 任务进度推送需要关闭缓冲
        proxy_buffering off;
    }

    # 上传文件访问（管理端预览用）
    location /profile/ {
        proxy_pass http://aid-server:8080/profile/;
    }
}
