brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH
namesrvAddr = rocketmq-nameserver:9876
# Broker 对外上报的地址：默认容器服务名，仅供同 compose 网络内的后端使用；
# 如需让【其他机器】连接本机 MQ，把下行改为本机对外 IP（如 brokerIP1 = 192.168.1.10），
# 并在 docker-compose.yml 的 rocketmq-broker 服务上开放 10909/10911 端口映射
brokerIP1 = rocketmq-broker
autoCreateTopicEnable = true
