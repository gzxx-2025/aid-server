# 项目相关配置
aid:
  # 名称
  name: aid
  # 版本
  version: 3.9.1
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/aid/uploadPath，Linux配置 /home/aid/uploadPath；部署时用环境变量 AID_PROFILE 注入）
  profile: ${AID_PROFILE:D:/aid/uploadPath}
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
  # 系统升级（AID产品版本，发布构建时注入；更新清单地址等动态配置存于 aid_config(category=system_upgrade)）
  upgrade:
    current-version: 1.0.0-rc.2
  # 媒体任务补偿调度（aid.chat.media.compensation.*）
  chat:
    media:
      compensation:
        # 是否启用 PROCESSING 任务兜底轮询
        enabled: true
        # 每轮最多处理条数
        batch-size: 50
        # 上一轮结束后延迟多少毫秒再执行下一轮（fixedDelay）
        fixed-delay-ms: 10000
        # 上游仍为处理中时，每次查询（含前端 pollRemote）都会 retry_count+1，达到此值判超时；视频生成建议 120～300
        max-retry: 120
  # 媒体任务请求/响应文件归档；动态总开关存于 aid_config(media/media_task_archive_enabled)，默认关闭。
  media-task-archive:
    # 基于 aid.profile 派生到同级 <profile>-private 后追加本专属子路径，避免被 /profile/** 公开访问。
    sub-path: media-task-archive/request-response
    # 单文件大小（MiB）；代码硬限制不超过 100 MiB。
    max-file-size-mb: 100
  extract:
    # 工作线程池
    executor:
      core-size: 6
      max-size: 12
      queue-capacity: 50
    # LLM 异步任务轮询配置（场景资产提取等场景：单次输出多场次 + 全文逐字保留时耗时较长）
    llm-poll:
      # 单次 LLM 调用最大等待秒数；融合版场景资产建立默认给 600s（10 分钟）兜底
      timeout-seconds: 600
      # 轮询间隔秒数
      interval-seconds: 3
    # LLM 模型参数
    llm:
      # 单次输出最大 token 数：plotContent 要求原文逐字保留，融合版场景提取/分镜脚本生成
      # 单场景输出常达 30K-50K tokens（含 18 字段 JSON 数组），需要充足空间。
      # 65536 token 约能放 100000 汉字，覆盖单次提取 / 单场景分镜的极限场景。
      # doubao-seed-2-0-pro 支持 64K 输出，方舟 / DashScope / Qwen 等主流模型均支持 ≥32K。
      max-tokens: 65536
  # 任务排队 / 并发调度 / 运行期自愈配置
  taskq:
    # 启动自愈是否强清遗留 PROCESSING 任务的租约：
    #   单实例部署 = true（默认）：本进程刚启动，PROCESSING 必属上次遗留，可立即重置；
    #   多实例部署 = 必须改为 false：否则新实例启动会强清其它存活实例正在执行的任务租约，
    #                               叠加运行期自愈会误杀活任务。
    restart-clear-leases: true
    # 运行期任务自愈已统一收口到后台「定时任务」固定任务管理：
    #   systemCoreTask.reapLeaselessProcessing（租约失活僵尸回收）
    #   extractZombieReclaimTask.reclaim（类型阈值兜底回收）
  # 接口信封加密（AES-GCM + RSA-OAEP）。开关/阈值/公私钥均存于数据库 aid_config(category=api_crypto)，
  # 运维改库 30s 内热生效，无需重启；此处仅配置“静态路由”——哪些路径走加密、哪些豁免。
  api-crypto:
    path:
      # 需要加解密的 C 端业务路径（不配则用代码默认值）
      include-patterns:
        - /api/**
        - /auth/**
        - /recharge/**
        - /realAuth/**
        - /captcha/**
      # 豁免（明文）路径，优先级高于 include
      exclude-patterns:
        - /auth/crypto/public-key   # 公钥下发引导接口
        - /auth/public-config       # 首屏公开配置（含加密状态+公钥）
        - /captcha/gen              # 滑块验证码生成(base64图)
        - /auth/wechat/**           # 微信扫码/回调
        - /pay/notify/**            # 支付回调
        - /api/callback/**          # 媒体厂商回调
        - /api/media/callback/**    # 媒体任务回调(Vidu/MPS等三方)，第三方明文回调不加密
        - /api/user/oss/**          # OSS 文件上传/下载
        - /api/user/task/stream/**  # SSE 任务进度推送
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /druid/**
        - /profile/**

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  # 优雅停机：收到停止信号后先拒绝新请求，等待处理中的请求完成再退出（配合升级器/容器停服）
  shutdown: graceful
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 接口加密后请求体经 Base64 会膨胀约 33%，POST body 上限放宽到 50MB 兜底
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.aid: error
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  lifecycle:
    # 优雅停机最长等待时间，超时后强制退出
    timeout-per-shutdown-phase: 25s
  jackson:
    default-property-inclusion: non_null
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 仅作为物理天花板（防止极端超大文件打满磁盘/内存）；实际单文件大小与类型限制由后台
      # 文件存储配置 aid_config(category=oss, config_name=uploadTypeLimits) 动态控制，业务层 OssTemplate 校验。
      # 若后台需配置超过该值的单文件类型，请同步调大此处。
      # 单个文件大小
      max-file-size: 1024MB
      # 设置总上传的文件大小（支持批量上传，需 >= 单文件上限 * 批量数量）
      max-request-size: 1024MB

  data:
    # redis 配置（部署时用环境变量 REDIS_HOST / REDIS_PORT / REDIS_PASSWORD 注入）
    redis:
      # 地址
      host: ${REDIS_HOST:localhost}
      # 端口，默认为6379
      port: ${REDIS_PORT:6379}
      # 数据库索引
      database: ${REDIS_DATABASE:0}
      # 密码（默认为空表示无密码）
      password: ${REDIS_PASSWORD:}
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥（生产环境必须用环境变量 TOKEN_SECRET 注入强随机值，禁止使用默认值上线）
  secret: ${TOKEN_SECRET:abcdefghijklmnopqrstuvwxyz}
  # 令牌有效期（默认30分钟）
  expireTime: 999999

# MyBatis Plus配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: com.aid.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.aid.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1



# RocketMQ（可选组件）：
#   rocketmq.enabled=false 时不装配消费者与发送模板，未部署 RocketMQ 的环境零依赖启动；
#   业务派发模式（MQ/本地双模式）由后台「消息队列配置」（aid_config category=mq）控制，默认本地模式。
rocketmq:
  enabled: ${ROCKETMQ_ENABLED:true} # 基础设施装配开关（未部署 RocketMQ 的环境设为 false）
  name-server: ${ROCKETMQ_NAMESERVER:localhost:9876} # NameServer 地址（环境变量注入）
  producer:
    group: aidproducergroup # 必须指定group
    send-message-timeout: 3000 # 消息发送超时时长，默认3s
    retry-times-when-send-failed: 3 # 同步发送消息失败重试次数，默认2
    retry-times-when-send-async-failed: 3 # 异步发送消息失败重试次数，默认2




# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

